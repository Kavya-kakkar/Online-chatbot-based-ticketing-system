{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .register-card {
      background: #fff;
      width: 100%;
      max-width: 380px;
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .input-field {
      margin-bottom: 14px;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #444;
      display: block;
      margin-bottom: 6px;
    }

    .password-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #5563DE;
      box-shadow: 0 0 0 3px rgba(85, 99, 222, 0.2);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 0.85rem;
      color: #5563DE;
      font-weight: 600;
      user-select: none;
    }

    .strength {
      margin-top: 6px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .weak { color: red; }
    .medium { color: orange; }
    .strong { color: green; }

    .register-btn {
      margin-top: 10px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #5563DE;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .register-btn:hover {
      background: #4052c5;
    }

    .messages {
      text-align: center;
      margin-top: 8px;
    }

    .messages h3 {
      color: red;
      font-size: 0.9rem;
    }

    .extra-links {
      text-align: center;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .extra-links a {
      color: #5563DE;
      text-decoration: none;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .register-card {
        padding: 25px 20px;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="register-card">
  <h2>Create Account ✨</h2>

  <form action="{% url 'register' %}" method="post">
    {% csrf_token %}

    <div class="input-field">
      <label>First Name</label>
      <input type="text" name="first_name" required>
    </div>

    <div class="input-field">
      <label>Last Name</label>
      <input type="text" name="last_name" required>
    </div>

    <div class="input-field">
      <label>Username</label>
      <input type="text" name="username" required>
    </div>

    <div class="input-field">
      <label>Email</label>
      <input type="email" name="email" required>
    </div>

    <div class="input-field">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" required onkeyup="checkStrength()">
        <span class="toggle-password" onclick="togglePassword('password', this)">Show</span>
      </div>
      <div id="strength" class="strength"></div>
    </div>

    <div class="input-field">
      <label>Confirm Password</label>
      <div class="password-wrapper">
        <input type="password" id="password2" name="password2" required>
        <span class="toggle-password" onclick="togglePassword('password2', this)">Show</span>
      </div>
    </div>

    <button type="submit" class="register-btn">Register</button>
  </form>

  <div class="messages">
    {% for message in messages %}
      <h3>{{ message }}</h3>
    {% endfor %}
  </div>

  <div class="extra-links">
    Already have an account? <a href="/login">Login</a>
  </div>
</div>

<script>
  function togglePassword(id, el) {
    const input = document.getElementById(id);
    if (input.type === "password") {
      input.type = "text";
      el.innerText = "Hide";
    } else {
      input.type = "password";
      el.innerText = "Show";
    }
  }

  function checkStrength() {
    const pwd = document.getElementById("password").value;
    const strength = document.getElementById("strength");

    if (pwd.length < 6) {
      strength.textContent = "Weak password";
      strength.className = "strength weak";
    } else if (pwd.match(/[A-Z]/) && pwd.match(/[0-9]/)) {
      strength.textContent = "Strong password";
      strength.className = "strength strong";
    } else {
      strength.textContent = "Medium strength";
      strength.className = "strength medium";
    }
  }
</script>

</body>
</html>
