{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #74ABE2, #5563DE);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15px;
    }

    .login-card {
      background: #fff;
      width: 100%;
      max-width: 360px;
      border-radius: 20px;
      padding: 40px 35px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      animation: fadeIn 0.8s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 15px;
      color: #333;
    }

    .input-field {
      margin-bottom: 14px;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #444;
      display: block;
      margin-bottom: 6px;
    }

    .password-wrapper {
      position: relative;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #5563DE;
      box-shadow: 0 0 0 3px rgba(85, 99, 222, 0.2);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 0.85rem;
      color: #5563DE;
      font-weight: 600;
      user-select: none;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .options label {
      font-weight: normal;
      margin: 0;
      cursor: pointer;
    }

    .login-btn {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #5563DE;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .login-btn:hover {
      background: #4052c5;
    }

    .messages {
      text-align: center;
      margin-top: 8px;
    }

    .messages h3 {
      color: red;
      font-size: 0.9rem;
      margin: 4px 0;
    }

    .extra-links {
      text-align: center;
      margin-top: 12px;
      font-size: 0.9rem;
    }

    .extra-links a {
      color: #5563DE;
      text-decoration: none;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 25px 20px;
        border-radius: 15px;
      }

      h2 {
        font-size: 1.5rem;
      }

      input {
        padding: 10px;
        font-size: 0.95rem;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="login-card">
  <h2>Welcome Back 👋</h2>

  <form action="{% url 'login' %}" method="post">
    {% csrf_token %}

    <div class="input-field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required>
    </div>

    <div class="input-field">
      <label>Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" name="password" placeholder="Enter password" required>
        <span class="toggle-password" onclick="togglePassword()">Show</span>
      </div>

      <div class="options">
        <label>
          <input type="checkbox" name="remember_me"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>
    </div>

    <button type="submit" class="login-btn">Login</button>
  </form>

  <div class="messages">
    {% for message in messages %}
      <h3>{{ message }}</h3>
    {% endfor %}
  </div>

  <div class="extra-links">
    Don’t have an account? <a href="/register">Register</a>
  </div>
</div>

<script>
  function togglePassword() {
    const pwd = document.getElementById("password");
    const toggle = document.querySelector(".toggle-password");

    if (pwd.type === "password") {
      pwd.type = "text";
      toggle.innerText = "Hide";
    } else {
      pwd.type = "password";
      toggle.innerText = "Show";
    }
  }
</script>

</body>
</html>
